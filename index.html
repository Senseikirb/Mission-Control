<title>Mission Control — Sci-Fi RPG</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg-0:#0a0a1f;--bg-1:#0f0f2a;--bg-2:#151535;--bg-3:#1e1e45;--bg-4:#2a2a55;
  --tx-0:#e0e8ff;--tx-1:#a0b0d0;--tx-2:#607090;--tx-3:#405070;
  --bdr:#1a2a50;--bdr-h:#2a3a60;
  --accent:#00f0ff;--success:#00ff9f;--warn:#ffd700;--danger:#ff0033;
  --radius:6px;--radius-lg:10px;
  --font-display:'Menlo','Consolas','Courier New',monospace;--font-body:-apple-system,'Segoe UI','Helvetica Neue',sans-serif;--font-mono:'Menlo','Consolas','Courier New',monospace;
  --shadow:0 0 30px rgba(0,240,255,.08),0 4px 20px rgba(0,0,0,.6);
  --glow-cyan:0 0 10px rgba(0,240,255,.3);--glow-gold:0 0 10px rgba(255,215,0,.3);--glow-green:0 0 10px rgba(0,255,159,.3);
  --transition:all .2s ease;
}
html{font-size:14px;scroll-behavior:smooth;height:100%;height:100dvh;}
body{background:var(--bg-0);color:var(--tx-0);font-family:var(--font-body);font-weight:500;display:flex;height:100%;height:100dvh;overflow:hidden;-webkit-tap-highlight-color:transparent;position:relative;}
body::after{content:'';position:fixed;top:0;left:0;right:0;bottom:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,240,255,.012) 2px,rgba(0,240,255,.012) 4px);pointer-events:none;z-index:9999;}
body::before{content:'';position:fixed;top:0;left:0;right:0;bottom:0;background:radial-gradient(1px 1px at 10% 20%,rgba(0,240,255,.4),transparent),radial-gradient(1px 1px at 50% 10%,rgba(0,255,159,.3),transparent),radial-gradient(1px 1px at 70% 40%,rgba(30,144,255,.4),transparent),radial-gradient(1px 1px at 90% 80%,rgba(255,0,255,.3),transparent),radial-gradient(1px 1px at 25% 60%,rgba(255,215,0,.2),transparent);pointer-events:none;z-index:0;}
.sidebar{width:210px;background:linear-gradient(180deg,var(--bg-1),#080820);border-right:1px solid var(--bdr);display:flex;flex-direction:column;flex-shrink:0;position:relative;z-index:10;}
.sidebar::after{content:'';position:absolute;right:0;top:0;bottom:0;width:1px;background:linear-gradient(180deg,transparent,var(--accent),transparent);opacity:.3;}
.sidebar-logo{padding:18px 14px;border-bottom:1px solid var(--bdr);}
.sidebar-logo h1{font-family:var(--font-display);font-size:.65rem;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--accent);line-height:1.6;text-shadow:var(--glow-cyan);}
.sidebar-logo span{font-size:.8rem;color:var(--tx-2);display:block;margin-top:2px;letter-spacing:1px;font-family:var(--font-mono);}
.nav-items{flex:1;padding:8px 6px;display:flex;flex-direction:column;gap:1px;overflow-y:auto;}
.nav-item{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:var(--radius);cursor:pointer;transition:var(--transition);color:var(--tx-1);font-weight:600;font-size:.8rem;border:1px solid transparent;font-family:var(--font-body);letter-spacing:.5px;}
.nav-item:hover{background:rgba(0,240,255,.04);color:var(--accent);}
.nav-item.active{background:rgba(0,240,255,.1);color:var(--accent);border-color:rgba(0,240,255,.25);}
.nav-item i{width:16px;text-align:center;font-size:.8rem;}
.sidebar-footer{padding:8px;border-top:1px solid var(--bdr);display:flex;flex-direction:column;gap:3px;}
.sidebar-btn{display:flex;align-items:center;gap:6px;padding:6px 10px;border-radius:var(--radius);cursor:pointer;font-size:.65rem;font-weight:600;background:var(--bg-2);border:1px solid var(--bdr);color:var(--tx-1);transition:var(--transition);font-family:var(--font-body);letter-spacing:.5px;}
.sidebar-btn:hover{background:var(--bg-3);color:var(--accent);}
.sidebar-btn i{width:14px;text-align:center;}
.main{flex:1;overflow-y:auto;overflow-x:hidden;padding:20px 24px;display:flex;flex-direction:column;gap:18px;position:relative;z-index:1;-webkit-overflow-scrolling:touch;overscroll-behavior-y:contain;}
.main::-webkit-scrollbar{width:4px;}.main::-webkit-scrollbar-thumb{background:var(--bg-4);border-radius:2px;}
.view{display:none;flex-direction:column;gap:18px;animation:fadeIn .3s ease;}.view.active{display:flex;}
@keyframes fadeIn{from{opacity:0;transform:translateY(5px);}to{opacity:1;transform:none;}}
.view-header{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;}
.view-header h2{font-family:var(--font-display);font-size:.9rem;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--accent);text-shadow:var(--glow-cyan);}
.card{background:linear-gradient(135deg,var(--bg-1),var(--bg-2));border:1px solid var(--bdr);border-radius:var(--radius-lg);padding:16px;position:relative;overflow:hidden;}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--accent),transparent);opacity:.25;}
.card-title{font-family:var(--font-display);font-size:.6rem;font-weight:600;color:var(--accent);text-transform:uppercase;letter-spacing:2px;margin-bottom:10px;}
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:8px;}
.stat-card{background:var(--bg-2);border:1px solid var(--bdr);border-radius:var(--radius);padding:12px;}
.stat-card::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),transparent);opacity:.15;}
.stat-value{font-family:var(--font-display);font-size:1.2rem;font-weight:700;margin-bottom:2px;}
.stat-label{font-size:.8rem;color:var(--tx-2);font-family:var(--font-mono);}
.progress-ring-wrap{display:flex;align-items:center;gap:20px;}
.progress-ring{position:relative;width:110px;height:110px;flex-shrink:0;}
.progress-ring svg{transform:rotate(-90deg);filter:drop-shadow(0 0 6px rgba(0,240,255,.25));}
.progress-ring circle{fill:none;stroke-width:6;}
.progress-ring .bg{stroke:var(--bg-3);}.progress-ring .fg{stroke:var(--accent);stroke-linecap:round;transition:stroke-dashoffset .6s ease;}
.progress-ring .pct{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-family:var(--font-display);font-size:1.1rem;font-weight:700;color:var(--accent);text-shadow:var(--glow-cyan);}
.phase-bars{flex:1;display:flex;flex-direction:column;gap:5px;}
.phase-bar-row{display:flex;align-items:center;gap:6px;}
.phase-bar-label{font-size:.65rem;color:var(--tx-1);width:120px;flex-shrink:0;font-weight:600;}
.phase-bar-track{flex:1;height:5px;background:var(--bg-3);border-radius:3px;overflow:hidden;}
.phase-bar-fill{height:100%;border-radius:3px;transition:width .5s ease;box-shadow:0 0 4px currentColor;}
.badge{display:inline-flex;align-items:center;padding:1px 6px;border-radius:3px;font-size:.55rem;font-weight:700;font-family:var(--font-display);letter-spacing:1px;border:1px solid;}
.badge-stretch{background:rgba(255,0,51,.08);color:var(--danger);border-color:rgba(255,0,51,.2);}
.xp-bar-wrap{margin-top:6px;}.xp-bar-label{font-family:var(--font-mono);font-size:.85rem;color:var(--tx-2);margin-bottom:2px;display:flex;justify-content:space-between;}
.xp-bar{height:7px;background:var(--bg-3);border-radius:4px;overflow:hidden;border:1px solid var(--bdr);}
.xp-bar-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,var(--accent),#1e90ff);box-shadow:0 0 8px rgba(0,240,255,.4);transition:width .6s ease;}
.stat-bar{display:flex;align-items:center;gap:6px;margin-bottom:4px;}
.stat-bar-name{font-family:var(--font-display);font-size:.5rem;letter-spacing:1px;text-transform:uppercase;width:55px;color:var(--tx-1);}
.stat-bar-track{flex:1;height:4px;background:var(--bg-3);border-radius:2px;overflow:hidden;}
.stat-bar-fill{height:100%;border-radius:2px;transition:width .4s ease;}
.stat-bar-val{font-family:var(--font-mono);font-size:.8rem;color:var(--tx-1);width:28px;text-align:right;}
.week-block{background:linear-gradient(135deg,var(--bg-1),var(--bg-2));border:1px solid var(--bdr);border-radius:var(--radius-lg);overflow:hidden;}
.week-block.current{border-color:var(--accent);box-shadow:0 0 0 1px var(--accent),0 0 20px rgba(0,240,255,.06);}
.week-header{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;cursor:pointer;user-select:none;}
.week-header:hover{background:rgba(0,240,255,.02);}
.week-header-left{display:flex;align-items:center;gap:8px;}
.week-header-left h3{font-family:var(--font-display);font-size:.6rem;font-weight:600;letter-spacing:1px;}
.week-pct{font-family:var(--font-mono);font-size:.85rem;color:var(--tx-2);background:var(--bg-3);padding:1px 8px;border-radius:3px;border:1px solid var(--bdr);}
.week-pct.done{background:rgba(0,255,159,.1);color:var(--success);border-color:rgba(0,255,159,.3);}
.week-chevron{transition:transform .2s;color:var(--tx-2);}
.week-block.open .week-chevron{transform:rotate(180deg);color:var(--accent);}
.week-body{display:none;padding:0 14px 12px;}.week-block.open .week-body{display:block;}
.activity-row{display:grid;grid-template-columns:28px 60px 1fr auto 44px 60px auto;align-items:center;gap:5px;padding:7px 0;border-bottom:1px solid rgba(0,240,255,.04);font-size:.75rem;}
.activity-row.completed .activity-name{text-decoration:line-through;color:var(--tx-3);}
.activity-row.completed{background:rgba(0,255,159,.02);margin:0 -14px;padding:7px 14px;}
.activity-check{width:22px;height:22px;border-radius:4px;border:2px solid var(--bdr);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:var(--transition);background:transparent;color:transparent;font-size:.55rem;}
.activity-check.checked{background:var(--success);border-color:var(--success);color:#000;box-shadow:var(--glow-green);}
.activity-day{font-family:var(--font-mono);font-size:.8rem;color:var(--tx-2);}
.activity-name{color:var(--tx-0);font-weight:600;}
.activity-links a{color:var(--accent);font-size:.6rem;margin-right:3px;text-decoration:none;}
.activity-hrs{font-family:var(--font-mono);font-size:.8rem;color:var(--tx-2);text-align:center;}
.actual-hrs-input{width:46px;background:var(--bg-3);border:1px solid var(--bdr);border-radius:4px;padding:3px 4px;color:var(--accent);font-family:var(--font-mono);font-size:.8rem;text-align:center;}
.actual-hrs-input:focus{outline:none;border-color:var(--accent);}
.activity-badges{display:flex;gap:2px;flex-wrap:wrap;}
.week-notes{margin-top:8px;}
.week-notes textarea{width:100%;background:var(--bg-2);border:1px solid var(--bdr);border-radius:var(--radius);padding:8px;color:var(--tx-0);font-family:var(--font-body);font-size:.78rem;resize:vertical;min-height:50px;}
.week-notes textarea:focus{outline:none;border-color:var(--accent);}
.week-notes label{font-size:.55rem;color:var(--tx-2);margin-bottom:3px;display:block;font-weight:700;font-family:var(--font-display);letter-spacing:1px;text-transform:uppercase;}
.project-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(min(440px,100%),1fr));gap:12px;}
.project-card{background:linear-gradient(135deg,var(--bg-1),var(--bg-2));border:1px solid var(--bdr);border-radius:var(--radius-lg);padding:16px;display:flex;flex-direction:column;gap:10px;position:relative;overflow:hidden;min-width:0;}
.project-card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,#ffd700,transparent);opacity:.25;}
.project-card h3{font-family:var(--font-display);font-size:.65rem;font-weight:700;letter-spacing:1px;color:#ffd700;}
.project-desc{font-size:.75rem;color:var(--tx-1);line-height:1.4;}
.tech-tag{background:var(--bg-3);border:1px solid var(--bdr);border-radius:3px;padding:1px 6px;font-size:.7rem;font-family:var(--font-mono);color:var(--accent);}
.project-metrics{font-size:.7rem;color:var(--tx-2);font-style:italic;padding:6px 10px;background:var(--bg-2);border-radius:var(--radius);border-left:2px solid #ffd700;}
.status-select{background:var(--bg-3);border:1px solid var(--bdr);border-radius:var(--radius);padding:5px 8px;color:var(--tx-0);font-family:var(--font-body);font-size:.72rem;cursor:pointer;}
.status-select:focus{outline:none;border-color:var(--accent);}
.project-url-row{display:flex;align-items:center;gap:6px;font-size:.7rem;}
.project-url-row label{color:var(--tx-2);width:60px;flex-shrink:0;font-weight:600;font-family:var(--font-display);font-size:.5rem;letter-spacing:1px;text-transform:uppercase;}
.project-url-row input{flex:1;background:var(--bg-3);border:1px solid var(--bdr);border-radius:4px;padding:4px 6px;color:var(--tx-0);font-size:.72rem;}
.project-url-row input:focus{outline:none;border-color:var(--accent);}
.crossover-toggle{font-size:.6rem;color:#ffd700;cursor:pointer;font-weight:700;font-family:var(--font-display);letter-spacing:1px;}
.crossover-matrix{display:none;font-size:.7rem;color:var(--tx-1);line-height:1.5;margin-top:4px;padding:8px;background:var(--bg-2);border-radius:var(--radius);border:1px solid var(--bdr);}
.crossover-matrix.open{display:block;}
.crossover-row{display:flex;gap:5px;margin-bottom:3px;align-items:baseline;}
.subtask-list{display:flex;flex-direction:column;gap:3px;}
.subtask-item{display:flex;align-items:center;gap:5px;font-size:.7rem;}
.subtask-item input[type=text]{flex:1;background:var(--bg-3);border:1px solid var(--bdr);border-radius:4px;padding:3px 6px;color:var(--tx-0);font-size:.7rem;}
.subtask-item input[type=text]:focus{outline:none;border-color:var(--accent);}
.add-subtask{font-size:.6rem;color:var(--accent);cursor:pointer;font-weight:700;background:none;border:none;padding:3px 0;font-family:var(--font-display);letter-spacing:1px;}
.del-subtask{color:var(--danger);cursor:pointer;font-size:.65rem;background:none;border:none;padding:2px;}
.project-progress{height:3px;background:var(--bg-3);border-radius:2px;overflow:hidden;margin-top:1px;}
.project-progress-fill{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--success),var(--accent));transition:width .4s ease;}
.resource-search{display:flex;gap:6px;margin-bottom:10px;}
.resource-search input{flex:1;background:var(--bg-2);border:1px solid var(--bdr);border-radius:var(--radius);padding:8px 12px;color:var(--tx-0);font-size:.82rem;}
.resource-search input:focus{outline:none;border-color:var(--accent);}
.filter-btn{background:var(--bg-2);border:1px solid var(--bdr);border-radius:3px;padding:4px 10px;font-size:.6rem;cursor:pointer;color:var(--tx-1);font-weight:700;font-family:var(--font-display);letter-spacing:1px;}
.filter-btn.active{background:rgba(0,240,255,.12);color:var(--accent);border-color:var(--accent);}
.resource-table{width:100%;border-collapse:collapse;}
.resource-table th{text-align:left;padding:8px 10px;font-family:var(--font-display);font-size:.5rem;text-transform:uppercase;letter-spacing:2px;color:var(--accent);border-bottom:1px solid var(--bdr);}
.resource-table td{padding:8px 10px;font-size:.75rem;border-bottom:1px solid rgba(0,240,255,.03);}
.resource-table tr:hover{background:rgba(0,240,255,.02);}
.resource-table a{color:var(--accent);text-decoration:none;}
.status-toggle{background:var(--bg-3);border:1px solid var(--bdr);border-radius:3px;padding:3px 7px;font-size:.55rem;cursor:pointer;color:var(--tx-1);font-family:var(--font-display);letter-spacing:1px;font-weight:600;}
.status-toggle.started{background:rgba(0,240,255,.1);color:var(--accent);border-color:rgba(0,240,255,.3);}
.status-toggle.completed{background:rgba(0,255,159,.1);color:var(--success);border-color:rgba(0,255,159,.3);}
.job-track-section{margin-bottom:12px;}
.job-track-header{display:flex;align-items:center;gap:8px;margin-bottom:6px;}
.job-track-header h3{font-family:var(--font-display);font-size:.55rem;font-weight:700;letter-spacing:1px;}
.job-table{width:100%;border-collapse:collapse;background:var(--bg-1);border:1px solid var(--bdr);border-radius:var(--radius-lg);overflow:hidden;}
.job-table th{text-align:left;padding:6px 8px;font-family:var(--font-display);font-size:.45rem;text-transform:uppercase;letter-spacing:2px;color:var(--accent);background:var(--bg-2);border-bottom:1px solid var(--bdr);}
.job-table td{padding:6px 8px;font-size:.7rem;border-bottom:1px solid rgba(0,240,255,.03);}
.job-table input,.job-table select{background:var(--bg-3);border:1px solid var(--bdr);border-radius:4px;padding:3px 6px;color:var(--tx-0);font-size:.68rem;font-family:var(--font-body);}
.job-table input:focus,.job-table select:focus{outline:none;border-color:var(--accent);}
.add-company-btn{display:inline-flex;align-items:center;gap:5px;padding:5px 12px;background:var(--bg-2);border:1px solid var(--bdr);border-radius:var(--radius);font-size:.7rem;color:var(--accent);cursor:pointer;font-family:var(--font-body);margin-top:5px;}
.app-counter{background:linear-gradient(135deg,var(--bg-1),var(--bg-2));border:1px solid var(--bdr);border-radius:var(--radius-lg);padding:12px 16px;display:flex;align-items:center;gap:14px;margin-bottom:12px;}
.app-counter .counter-value{font-family:var(--font-display);font-size:1.6rem;font-weight:700;color:var(--accent);text-shadow:var(--glow-cyan);}
.app-counter .counter-label{font-size:.85rem;color:var(--tx-1);font-family:var(--font-mono);}
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(5,5,20,.85);backdrop-filter:blur(3px);z-index:100;display:none;align-items:center;justify-content:center;}
.modal-overlay.show{display:flex;}
.modal{background:linear-gradient(135deg,var(--bg-1),var(--bg-2));border:1px solid var(--accent);border-radius:var(--radius-lg);padding:22px;max-width:420px;width:92%;box-shadow:0 0 40px rgba(0,240,255,.12);}
.modal h3{font-family:var(--font-display);font-size:.7rem;margin-bottom:12px;letter-spacing:1px;color:var(--accent);}
.modal input[type=date],.modal input[type=text],.modal textarea{width:100%;background:var(--bg-2);border:1px solid var(--bdr);border-radius:var(--radius);padding:8px;color:var(--tx-0);font-family:var(--font-body);font-size:.82rem;margin-bottom:8px;}
.modal input:focus,.modal textarea:focus{outline:none;border-color:var(--accent);}
.modal-btn{width:100%;padding:10px;background:linear-gradient(135deg,rgba(0,240,255,.15),rgba(30,144,255,.15));color:var(--accent);border:1px solid var(--accent);border-radius:var(--radius);font-weight:700;font-size:.72rem;cursor:pointer;font-family:var(--font-display);letter-spacing:2px;text-transform:uppercase;}
.modal-btn:hover{box-shadow:var(--glow-cyan);}
.modal-btn.danger{background:rgba(255,0,51,.12);color:var(--danger);border-color:var(--danger);}
.modal-btn.secondary{background:var(--bg-3);color:var(--tx-1);margin-top:6px;border-color:var(--bdr);}
.checkpoint{background:var(--bg-2);border-left:2px solid #ffd700;padding:8px 12px;border-radius:0 var(--radius) var(--radius) 0;font-size:.72rem;color:var(--tx-1);margin-top:6px;line-height:1.4;}
.week-block.current .week-header-left h3::after{content:'ACTIVE';margin-left:6px;font-size:.45rem;background:var(--accent);color:#000;padding:1px 5px;border-radius:3px;vertical-align:middle;animation:pulse 2s infinite;font-family:var(--font-display);letter-spacing:1px;font-weight:800;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.5;}}
.mark-week-btn{display:inline-flex;align-items:center;gap:5px;padding:7px 12px;background:var(--bg-2);border:1px solid var(--bdr);border-radius:var(--radius);font-size:.6rem;color:var(--accent);cursor:pointer;font-family:var(--font-display);letter-spacing:1px;margin-top:6px;min-height:40px;}
.mark-week-btn:hover{border-color:var(--accent);}
.toast{position:fixed;bottom:20px;right:20px;background:rgba(0,255,159,.1);color:var(--success);padding:8px 18px;border-radius:var(--radius);font-size:.7rem;font-weight:700;font-family:var(--font-display);letter-spacing:2px;z-index:200;opacity:0;transform:translateY(8px);transition:all .3s ease;pointer-events:none;border:1px solid rgba(0,255,159,.25);}

}
function loadState(){try{const d=localStorage.getItem(STORAGE_KEY);return d?deepMerge(defaultState(),JSON.parse(d)):defaultState();}catch(e){return defaultState();}}
function deepMerge(a,b){const r={...a};for(const k in b){if(b[k]&&typeof b[k]==='object'&&!Array.isArray(b[k])&&a[k]&&typeof a[k]==='object'&&!Array.isArray(a[k])){r[k]=deepMerge(a[k],b[k]);}else{r[k]=b[k];}}return r;}
function saveState(){try{localStorage.setItem(STORAGE_KEY,JSON.stringify(state));}catch(e){}showToast();}

// ─── RPG ENGINE ─────────────────────────────────────────────────────────
function xpForRank(n){return n*n*50+n*50;}
function totalXPForRank(n){let t=0;for(let i=1;i<n;i++)t+=xpForRank(i);return t;}
function getCurrentRankXP(){return state.rpg.totalXP-totalXPForRank(state.rpg.rank);}
function getXPToNextRank(){return xpForRank(state.rpg.rank);}
function getRankName(r){return C.rpg.ranks[Math.min(r-1,C.rpg.ranks.length-1)]||'Supreme Commander';}
function getDifficulty(hrs){if(hrs>=6)return'Critical';if(hrs>=4)return'High-Risk';if(hrs>=3)return'Complex';if(hrs>=2)return'Standard';return'Routine';}
function getDiffStars(d){return C.rpg.difficultyStars[d]||'★';}

function awardXP(hrs,tracks,isStretch){
  const diff=getDifficulty(hrs);let baseXP=C.rpg.difficultyXP[diff]||10;
  if(isStretch)baseXP=Math.round(baseXP*0.75);
  const cls=C.rpg.classes.find(c=>c.id===state.rpg.classId)||C.rpg.classes[C.rpg.classes.length-1];
  if(cls.bonus.all)baseXP=Math.round(baseXP*cls.bonus.all);
  baseXP=Math.round(baseXP*(1+Math.min(state.streak.count*0.1,1.0)));
  if(state.rpg.augmentations.includes('overclock')&&(diff==='High-Risk'||diff==='Critical'))baseXP=Math.round(baseXP*1.1);
  const today=new Date().toISOString().slice(0,10);
  if(state.rpg._lastMissionDate!==today){baseXP+=25;state.rpg._lastMissionDate=today;}
  state.rpg.xp+=baseXP;state.rpg.totalXP+=baseXP;state.rpg.totalCompleted++;
  tracks.forEach(t=>{if(!state.rpg.categoryCount[t])state.rpg.categoryCount[t]=0;state.rpg.categoryCount[t]++;if(state.rpg.categoryCount[t]%10===0)state.rpg.xp+=50;});
  // Grow stats based on track→stat mapping
  C.rpg.stats.forEach(st=>{const match=tracks.some(t=>st.tracks.includes(t));if(match){const bk=cls.bonus[tracks.find(t=>st.tracks.includes(t))]||1;state.rpg.stats[st.key]=Math.min(100,(state.rpg.stats[st.key]||10)+Math.round(baseXP/30*bk));}});
  const oldRank=state.rpg.rank;
  while(state.rpg.xp>=getXPToNextRank()){state.rpg.xp-=getXPToNextRank();state.rpg.rank++;C.rpg.stats.forEach(s=>{state.rpg.stats[s.key]=Math.min(100,(state.rpg.stats[s.key]||10)+1);});if(state.rpg.rank%5===0)state.rpg.augPoints++;}
  if(state.rpg.rank>oldRank)showRankUp(state.rpg.rank);
  rollReward(diff);checkAchievements();saveState();return baseXP;
}
function rollReward(diff){
  let ch=0.7+({Routine:-0.2,Standard:-0.1,Complex:0,'High-Risk':0.1,Critical:0.2}[diff]||0)+Math.min(state.streak.count*0.01,0.1)+Math.max(0,((state.rpg.stats.credits||10)-10)*0.005);
  if(state.rpg.augmentations.includes('resource'))ch+=0.05;
  if(Math.random()>ch){showReward(null);return;}
  let roll=Math.random()*100,acc=0;
  for(const tier of C.rpg.rewardTiers){acc+=tier.pct;if(roll<=acc){showReward(tier);return;}}
  showReward(C.rpg.rewardTiers[0]);
}
function showReward(tier){
  const p=document.getElementById('rewardPopup'),cr=document.getElementById('rewardCrate'),ti=document.getElementById('rewardTier'),tx=document.getElementById('rewardText'),cl=document.getElementById('rewardClaim');
  if(!tier){cr.textContent='📦';cr.style.background='var(--bg-3)';cr.style.border='1px solid var(--bdr)';ti.textContent='NO REWARD';ti.style.color='var(--tx-2)';tx.textContent='The algorithm was not generous… but your rank advances.';cl.style.color='var(--tx-2)';cl.style.borderColor='var(--bdr)';
  }else{const rw=(C.rpg.defaultRewards[tier.name]||['Mystery']); const r=rw[Math.floor(Math.random()*rw.length)];cr.textContent=tier.icon;cr.style.background='rgba(0,0,0,.3)';cr.style.border='2px solid '+tier.color;ti.textContent=tier.name.toUpperCase();ti.style.color=tier.color;tx.textContent=r;cl.style.color=tier.color;cl.style.borderColor=tier.color;state.rpg.rewardHistory.push({tier:tier.name,reward:r,date:new Date().toISOString().slice(0,10)});}
  p.classList.add('show');
}

function showRankUp(r){setTimeout(()=>{document.getElementById('rankupRank').textContent='Level '+r+' — '+getRankName(r);document.getElementById('rankupMsg').textContent=C.rpg.rankMessages[Math.min(r-1,C.rpg.rankMessages.length-1)];document.getElementById('rankupOverlay').classList.add('show');},600);}

function checkAchievements(){
  const ctx={totalCompleted:state.rpg.totalCompleted,totalXP:state.rpg.totalXP,rank:state.rpg.rank,streak:state.streak.count,credsEarned:state.rpg.credsEarned||0,shipped:Object.values(state.projectData).filter(p=>p.status==='Shipped').length};
  C.rpg.achievements.forEach(a=>{if(!state.achievements.includes(a.id)){try{if(evalCondition(a.condition,ctx))state.achievements.push(a.id);}catch(e){}}});
}
function evalCondition(expr,ctx){
  // Safe evaluator for "key>=N" style conditions
  const m=expr.match(/^(\w+)\s*(>=|<=|>|<|===|==)\s*(\d+)$/);
  if(!m)return false;
  const val=ctx[m[1]];const op=m[2];const num=parseInt(m[3]);
  if(val===undefined)return false;
  if(op==='>=')return val>=num;if(op==='<=')return val<=num;
  if(op==='>')return val>num;if(op==='<')return val<num;
  if(op==='==='||op==='==')return val===num;
  return false;
}

div class="project-progress"><div class="project-progress-fill" style="width:${sp}%;"></div></div><div style="display:flex;flex-direction:column;gap:5px;"><div class="project-url-row"><label>GitHub</label><input placeholder="url…" value="${d.github||''}" onchange="setPU('${p.id}','github',this.value)"></div><div class="project-url-row"><label>Video</label><input placeholder="url…" value="${d.video||''}" onchange="setPU('${p.id}','video',this.value)"></div><div class="project-url-row"><label>Demo</label><input placeholder="url…" value="${d.demo||''}" onchange="setPU('${p.id}','demo',this.value)"></div><div class="project-url-row"><label>Metrics</label><input placeholder="actual…" value="${d.actualMetrics||''}" onchange="setPU('${p.id}','actualMetrics',this.value)"></div></div><span class="crossover-toggle" onclick="this.nextElementSibling.classList.toggle('open')">→ CROSSOVER</span><div class="crossover-matrix">${ch}</div><div><div style="font-size:.5rem;color:var(--tx-2);font-family:var(--font-display);letter-spacing:1px;margin-bottom:4px;">SUBTASKS</div><div class="subtask-list">${sh}</div><button class="add-subtask" onclick="addSub('${p.id}')">+ Add</button></div>`;g.appendChild(c);});}
window.setPSt=function(p,v){state.projectData[p].status=v;saveState();if(v==='Shipped'){checkAchievements();saveState();}};
window.setPU=function(p,f,v){state.projectData[p][f]=v;saveState();};
window.togSub=function(p,i,el){state.projectData[p].subtasks[i].done=!state.projectData[p].subtasks[i].done;el.classList.toggle('checked');el.setAttribute('aria-checked',state.projectData[p].subtasks[i].done);saveState();renderProjects();};
window.edSub=function(p,i,v){state.projectData[p].subtasks[i].text=v;saveState();};
window.delSub=function(p,i){state.projectData[p].subtasks.splice(i,1);saveState();renderProjects();};
window.addSub=function(p){state.projectData[p].subtasks.push({id:p+'_st'+Date.now(),text:'New task',done:false});saveState();renderProjects();};

// ─── RESOURCES ──────────────────────────────────────────────────────────
function renderResources(){const cats=[...new Set(C.resources.map(r=>r.cat))];document.getElementById('resFilters').innerHTML='<button class="filter-btn active" onclick="fltRes(\'all\',this)">ALL</button>'+cats.map(c=>`<button class="filter-btn" onclick="fltRes('${c}',this)">${c.toUpperCase()}</button>`).join('');renderResT(C.resources);}
function renderResT(list){const tb=document.querySelector('#resTable tbody');tb.innerHTML='';list.forEach(r=>{const idx=C.resources.indexOf(r);const st=state.resourceStatus['r'+idx]||'N/A';const cls=st==='Started'?'started':st==='Completed'?'completed':'';tb.innerHTML+=`<tr><td>${r.name}</td><td><a href="${r.url}" target="_blank">${r.url.replace(/^https?:\/\//,'').slice(0,30)}…</a></td><td><span class="badge badge-${r.cat==='Course'?'ai':r.cat==='Tool'?'ge':'pm'}">${r.cat}</span></td><td style="font-size:.65rem;">${r.cost}</td><td><button class="status-toggle ${cls}" onclick="cycRes(${idx},this)">${st}</button></td></tr>`;});}
window.fltRes=function(c,b){document.querySelectorAll('.filter-btn').forEach(x=>x.classList.remove('active'));b.classList.add('active');renderResT(c==='all'?C.resources:C.resources.filter(r=>r.cat===c));};
document.getElementById('resSearch').addEventListener('input',function(){const q=this.value.toLowerCase();renderResT(C.resources.filter(r=>r.name.toLowerCase().includes(q)||r.url.toLowerCase().includes(q)));document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));document.querySelector('.filter-btn').classList.add('active');});
window.cycRes=function(i,b){const cy=['N/A','Started','Completed'];const c=state.resourceStatus['r'+i]||'N/A';const n=cy[(cy.indexOf(c)+1)%3];state.resourceStatus['r'+i]=n;saveState();b.textContent=n;b.className='status-toggle'+(n==='Started'?' started':n==='Completed'?' completed':'');};

// ─── JOBS ───────────────────────────────────────────────────────────────
function renderJobs(){const c=document.getElementById('jobContainer');c.innerHTML='';const ws=new Date();ws.setDate(ws.getDate()-ws.getDay());ws.setHours(0,0,0,0);let wa=0;Object.values(state.jobData).forEach(j=>{if(j.dateApplied){const d=new Date(j.dateApplied+'T00:00:00');if(d>=ws)wa++;}});(state.customJobs||[]).forEach(j=>{if(j.dateApplied){const d=new Date(j.dateApplied+'T00:00:00');if(d>=ws)wa++;}});document.getElementById('weeklyAppCount').textContent=wa;
  C.jobTracks.forEach(tr=>{const sec=document.createElement('div');sec.className='job-track-section';let rows='';tr.companies.forEach((co,i)=>{const k=tr.code+'_'+i;const d=state.jobData[k]||{company:co,status:'Not Applied',dateApplied:'',notes:'',contact:''};rows+=jRow(k,d,false);});(state.customJobs||[]).filter(j=>j.track===tr.code).forEach(j=>{rows+=jRow(j.id,j,true);});const tBadge=C.tracks.find(t=>t.code===tr.code);sec.innerHTML=`<div class="job-track-header"><span class="badge badge-${tr.code.toLowerCase()}">${tr.code}</span><h3>${tr.name}</h3></div><table class="job-table"><thead><tr><th>Target</th><th>Status</th><th>Date</th><th>Contact</th><th>Notes</th></tr></thead><tbody>${rows}</tbody></table><button class="add-company-btn" onclick="addCo('${tr.code}')">+ Add</button>`;c.appendChild(sec);});}
function jRow(k,d,ic){const st=['Not Applied','Applied','Interviewing','Offer','Rejected'];return`<tr><td>${ic?`<input style="width:90px;" value="${d.company}" onchange="edCJ('${k}','company',this.value)">`:d.company}</td><td><select class="status-select" onchange="${ic?`edCJ('${k}','status',this.value)`:`setJF('${k}','status',this.value)`}">${st.map(s=>`<option ${d.status===s?'selected':''}>${s}</option>`).join('')}</select></td><td><input type="date" value="${d.dateApplied||''}" onchange="${ic?`edCJ('${k}','dateApplied',this.value)`:`setJF('${k}','dateApplied',this.value)`}"></td><td><input value="${d.contact||''}" placeholder="Name" onchange="${ic?`edCJ('${k}','contact',this.value)`:`setJF('${k}','contact',this.value)`}"></td><td><input value="${d.notes||''}" placeholder="…" style="width:120px;" onchange="${ic?`edCJ('${k}','notes',this.value)`:`setJF('${k}','notes',this.value)`}"></td></tr>`;}
window.setJF=function(k,f,v){if(!state.jobData[k])state.jobData[k]={company:'',status:'Not Applied',dateApplied:'',notes:'',contact:''};state.jobData[k][f]=v;saveState();if(f==='dateApplied'||f==='status')renderJobs();};
window.addCo=function(t){if(!state.customJobs)state.customJobs=[];state.customJobs.push({id:'c_'+Date.now(),track:String(t),company:'New Target',status:'Not Applied',dateApplied:'',notes:'',contact:''});saveState();renderJobs();};
window.edCJ=function(id,f,v){const j=(state.customJobs||[]).find(x=>x.id===id);if(j){if(f==='track'&&!v)return;j[f]=v;saveState();if(f==='dateApplied')renderJobs();}};

// ─── OPERATIVE ──────────────────────────────────────────────────────────
function renderOperative(){const r=state.rpg;const cls=C.rpg.classes.find(c=>c.id===r.classId)||C.rpg.classes[0];const hp=100+((r.stats.vitality||10)*5)+(r.augmentations.includes('redundancy')?20:0);const mp=50+((r.stats.neural||10)*3);
  document.getElementById('operativeProfile').innerHTML=`<div class="card"><div class="card-title">Dossier</div><div class="dossier-grid">
    <div><div style="font-family:var(--font-display);font-size:.55rem;letter-spacing:2px;color:#ffd700;text-transform:uppercase;">Level ${r.rank} — ${getRankName(r.rank)}</div><div style="font-family:var(--font-display);font-size:1rem;font-weight:800;margin:4px 0;">${r.name||'Unregistered'}</div><div style="font-family:var(--font-mono);font-size:.85rem;color:var(--accent);">[${cls.name}] // ${r.callsign||'N/A'}</div>
      <div style="margin-top:8px;"><div class="stat-bar"><span style="width:16px;color:var(--danger)">♥</span><span class="stat-bar-name">HP</span><div class="stat-bar-track"><div class="stat-bar-fill" style="width:100%;background:var(--danger);"></div></div><span class="stat-bar-val">${hp}</span></div>
      <div class="stat-bar"><span style="width:16px;color:var(--accent)">⬡</span><span class="stat-bar-name">MP</span><div class="stat-bar-track"><div class="stat-bar-fill" style="width:100%;background:var(--accent);"></div></div><span class="stat-bar-val">${mp}</span></div></div></div>
    <div><div style="font-family:var(--font-display);font-size:.5rem;letter-spacing:1px;color:var(--tx-2);margin-bottom:4px;">PRIMARY STATS</div>`+
    C.rpg.stats.map(s=>`<div class="stat-bar"><span style="width:16px;color:${s.color}">${s.icon}</span><span class="stat-bar-name" style="color:${s.color}">${s.name}</span><div class="stat-bar-track"><div class="stat-bar-fill" style="width:${r.stats[s.key]||10}%;background:${s.color};"></div></div><span class="stat-bar-val">${r.stats[s.key]||10}</span></div>`).join('')+
    `<div style="margin-top:6px;font-family:var(--font-mono);font-size:.8rem;color:var(--tx-2);">XP: ${r.totalXP} | Missions: ${r.totalCompleted} | Rewards: ${r.rewardHistory.length}</div></div></div></div>`;
  document.getElementById('augPoints').textContent='Augmentation Points: '+r.augPoints;
  const ag=document.getElementById('augGrid');ag.innerHTML='';C.rpg.augmentations.forEach(a=>{const ia=r.augmentations.includes(a.id);ag.innerHTML+=`<div class="aug-card ${ia?'active':''}" onclick="buyAug('${a.id}')"><h4>${a.icon} ${a.name}</h4><p>${a.desc}</p>${ia?'<div style="font-family:var(--font-display);font-size:.45rem;color:var(--success);letter-spacing:1px;margin-top:4px;">INSTALLED</div>':''}</div>`;});
}
window.buyAug=function(id){if(state.rpg.augmentations.includes(id))return;if(state.rpg.augPoints<1)return alert('Need augmentation points (1 per 5 ranks)');state.rpg.augPoints--;state.rpg.augmentations.push(id);saveState();renderOperative();};

// ─── ACHIEVEMENTS ───────────────────────────────────────────────────────
function renderAchievements(){checkAchievements();saveState();const g=document.getElementById('achievementGrid');g.innerHTML='';C.rpg.achievements.forEach(a=>{const u=state.achievements.includes(a.id);g.innerHTML+=`<div class="achievement-badge ${u?'unlocked':''}"><div class="ach-icon">${a.icon}</div><div class="ach-name">${a.name}</div><div class="ach-desc">${a.desc}</div></div>`;});}

// ─── CONFIG EDITOR ──────────────────────────────────────────────────────
function loadConfigEditor(){
  // Serialize CONFIG (excluding functions) for editing
  const exportable={meta:C.meta,tracks:C.tracks,phases:C.phases,weeks:C.weeks,projects:C.projects,resources:C.resources,jobTracks:C.jobTracks,rpg:{classes:C.rpg.classes,ranks:C.rpg.ranks,rankMessages:C.rpg.rankMessages,stats:C.rpg.stats,augmentations:C.rpg.augmentations,difficultyMap:C.rpg.difficultyMap,difficultyXP:C.rpg.difficultyXP,difficultyStars:C.rpg.difficultyStars,rewardTiers:C.rpg.rewardTiers,defaultRewards:C.rpg.defaultRewards,achievements:C.rpg.achievements}};
  document.getElementById('configEditor').value=JSON.stringify(exportable,null,2);
}
window.copyConfig=function(){const ed=document.getElementById('configEditor');ed.select();navigator.clipboard.writeText(ed.value).then(()=>{document.getElementById('configStatus').innerHTML='<span style="color:var(--success);">Copied to clipboard ✓</span>';}).catch(()=>{document.getElementById('configStatus').innerHTML='<span style="color:var(--danger);">Copy failed — select and Ctrl+C manually</span>';});};
window.applyConfig=function(){
  try{
    const newCfg=JSON.parse(document.getElementById('configEditor').value);
    // Validate basic structure
    if(!newCfg.weeks||!newCfg.tracks||!newCfg.meta) throw new Error('Missing required sections');
    // Apply to CONFIG
    Object.assign(C.meta,newCfg.meta);C.tracks.length=0;C.tracks.push(...newCfg.tracks);C.phases.length=0;C.phases.push(...newCfg.phases);C.weeks.length=0;C.weeks.push(...newCfg.weeks);C.projects.length=0;C.projects.push(...newCfg.projects);C.resources.length=0;C.resources.push(...newCfg.resources);C.jobTracks.length=0;C.jobTracks.push(...newCfg.jobTracks);
    if(newCfg.rpg){Object.assign(C.rpg,newCfg.rpg);}
    // Re-generate track CSS
    const css=C.tracks.map(t=>`.badge-${t.code.toLowerCase()}{background:${t.bg};color:${t.color};border-color:${t.color}33;}`).join('\n');
    styleEl.textContent=css;
    // Re-initialize state for new weeks/activities (preserve existing data)
    C.weeks.forEach(w=>w.activities.forEach((_,i)=>{const k=`w${w.num}_a${i}`;if(!state.activities[k])state.activities[k]={completed:false,actualHrs:''};}));
    C.weeks.forEach(w=>{if(!state.weekNotes['w'+w.num])state.weekNotes['w'+w.num]='';});
    C.projects.forEach(p=>{if(!state.projectData[p.id])state.projectData[p.id]={status:'Not Started',github:'',video:'',demo:'',actualMetrics:'',subtasks:p.defaultTasks.map((t,i)=>({id:p.id+'_st'+i,text:t,done:false}))};});
    C.resources.forEach((_,i)=>{if(!state.resourceStatus['r'+i])state.resourceStatus['r'+i]='N/A';});
    C.rpg.stats.forEach(s=>{if(!state.rpg.stats[s.key])state.rpg.stats[s.key]=10;});
    // Rebuild nav
    sideNav.innerHTML='';botNav.innerHTML='';
    C.views.forEach((v,i)=>{sideNav.innerHTML+=`<div class="nav-item" data-view="${v.id}"><i class="fas ${v.icon}"></i><span>${v.label}</span></div>`;if(v.showBottom)botNav.innerHTML+=`<div class="bottom-nav-item" data-view="${v.id}"><i class="fas ${v.icon}"></i><span>${v.bottomLabel}</span></div>`;});
    document.querySelectorAll('.nav-item,.bottom-nav-item').forEach(i=>i.addEventListener('click',()=>switchView(i.dataset.view)));
    saveState();renderAll();
    document.getElementById('configStatus').innerHTML='<span style="color:var(--success);">Config applied ✓ All views updated.</span>';
  }catch(e){document.getElementById('configStatus').innerHTML=`<span style="color:var(--danger);">Error: ${e.message}</span>`;}
};
window.resetConfig=function(){if(confirm('Reset config to built-in defaults? Your progress data is preserved.')){location.reload();}};

// ─── EXPORT/IMPORT/RESET ────────────────────────────────────────────────
document.getElementById('exportBtn').onclick=()=>{const b=new Blob([JSON.stringify(state,null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='mission-ctrl-'+new Date().toISOString().slice(0,10)+'.json';a.click();};
document.getElementById('importBtn').onclick=()=>document.getElementById('importFile').click();
document.getElementById('importFile').onchange=function(){const f=this.files[0];if(!f)return;const r=new FileReader();r.onload=e=>{try{state=deepMerge(defaultState(),JSON.parse(e.target.result));saveState();renderAll();alert('Data synced!');}catch(err){alert('Invalid file.');}};r.readAsText(f);};
document.getElementById('resetBtn').onclick=()=>document.getElementById('resetModal').classList.add('show');
document.getElementById('cancelReset').onclick=()=>document.getElementById('resetModal').classList.remove('show');
document.getElementById('confirmReset').onclick=()=>{try{localStorage.removeItem(STORAGE_KEY);}catch(e){}state=defaultState();document.getElementById('resetModal').classList.remove('show');document.getElementById('startModal').classList.add('show');renderAll();};
document.getElementById('mobileExportBtn').onclick=()=>document.getElementById('exportBtn').click();
document.getElementById('mobileImportBtn').onclick=()=>document.getElementById('importBtn').click();
document.getElementById('mobileResetBtn').onclick=()=>document.getElementById('resetBtn').click();

// ─── RENDER ALL ─────────────────────────────────────────────────────────
function renderAll(){renderDashboard();renderCalendar();renderProjects();renderResources();renderJobs();}
renderAll();
}catch(e){
  var d=document.createElement('div');
  d.style.cssText='position:fixed;top:0;left:0;right:0;padding:20px;background:#ff0033;color:#fff;font-family:monospace;font-size:14px;z-index:99999;word-break:break-all;white-space:pre-wrap;';
  d.textContent='CATCH: '+e.message+'\n'+e.stack;
  document.body.appendChild(d);
}
</script>
</body>
</html>
